services:
  auto:
    build: .                    # see Dockerfile 
    user: "1055:1055"           # non-root; matches host uid so scratch writes work
    network_mode: host

    # security
    read_only: true             # container can't modify its own image/binaries
    cap_drop:
      - ALL                     # strip all Linux capabilities (no raw sockets, mounts, etc.)
    security_opt:
      - no-new-privileges:true  # prevent setuid binaries from re-gaining privileges

    # resources
    # mem_limit: 2g               # hard memory cap
    # memswap_limit: 2g           # disables swap (swap = mem_limit means no extra swap)
    shm_size: "16gb"              # PyTorch DataLoader workers need shared memory for prefetched batches
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]  # GPU index — change to "1", "2", etc.
              capabilities: [gpu]

    tmpfs:
      - /tmp                    # writable in-memory scratch (needed because root fs is read-only)
      # add /home/jingjie/.cache here when running real PyTorch/HuggingFace workloads
    working_dir: /home/jingjie/Dev/AutoME

    volumes:
      - /mnt3/repo_and_weights/weights:/mnt3/repo_and_weights/weights:ro
      - /mnt3/repo_and_weights/repo:/mnt3/repo_and_weights/repo:ro
      - /mnt3/repo_and_weights/agent:/mnt3/repo_and_weights/agent:rw
      - /mnt4/auto-ekyc/idrecapture/datasets:/mnt4/auto-ekyc/idrecapture/datasets:ro
      - /routine_data:/routine_data:ro
      - /mnt3/agent_data:/mnt3/agent_data:ro
      - /home/jingjie/Dev/AutoTorch:/home/jingjie/Dev/AutoTorch:ro
      - /home/jingjie/Dev/AutoME:/home/jingjie/Dev/AutoME:rw   # agent reads/writes runs/ and configs
      - /home/jingjie/.codex:/home/jingjie/.codex:rw           # session logs for step 10 token tracking

    environment:
      - RUNS_DIR=/mnt3/repo_and_weights/agent
      # OPENAI_API_KEY not needed — Codex uses ~/.codex login session

    command: sleep infinity     # keeps container alive; use `docker compose exec auto bash`
